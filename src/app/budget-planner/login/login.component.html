<div class="navbar">
    <h1>Budget Planner</h1>
</div>
<div class="login-container">
    <!-- Login -->
    <form *ngIf="activeForm=='login'" [formGroup]="loginForm" (ngSubmit)="login()">
        <h2>Login</h2>
        <div class="form-group">
            <input class="form-control" type="email" name="Email" id="" formControlName="email" placeholder="Email">
        </div>
        <div class="form-group">
            <input type="password" name="Password" id="" formControlName="password" placeholder="
        password">
        </div>
        <button type="submit" style="width:100%;height:40px;padding:5px">Login</button>
        <p (click)="toggleForm('register')">Don't have an account <span class="highlited">Register</span></p>
    </form>
    <!-- Register -->
    <form *ngIf="activeForm=='register'" [formGroup]="registerForm" (ngSubmit)="register()">

        <h2>Register</h2>
        <div class="form-group">
            <input class="form-control" type="text" name="username" id="" formControlName="username"
                placeholder="Username">
        </div>
        <div class="form-group">
            <input class="form-control" type="email" name="Email" id="" formControlName="email" placeholder="Email">
        </div>
        <div class="form-group">
            <input type="password" name="Password" id="" formControlName="password" placeholder="
        password">
        </div>
        <button type="submit" style="width:100%;height:40px;padding:5px">Register</button>
        <p (click)="toggleForm('login')">I have an account <span class="highlited">Login</span></p>
    </form>

</div>
